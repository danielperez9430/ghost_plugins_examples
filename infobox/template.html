<div class="infobox-card infobox-card--{{boxType}}">
  <div class="infobox-card__icon">
    <span class="infobox-card__icon-symbol"></span>
  </div>
  <div class="infobox-card__content">
    {{#if title}}
    <h4 class="infobox-card__title">{{title}}</h4>
    {{/if}}
    {{#if message}}
    <p class="infobox-card__message">{{message}}</p>
    {{/if}}
  </div>
</div>
